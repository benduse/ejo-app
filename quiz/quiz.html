<body>
  <header class="app-header">
    <img src="../images/logo.svg" alt="ejo Quiz App Logo" class="logo">
    <button class="nav-toggle" aria-label="Toggle navigation">
      <i class="fas fa-bars"></i>
    </button>
    <nav>
      <a href="../index.html">Home</a>
      <a href="../flashcards/flashcards.html">Flashcards</a>
      <a href="../survey/survey.html">Feedback</a>
    </nav>
  </header>

  <main class="app-main">
    <div class="app-card">
      <div class="quiz-controls">
        <div class="language-selector">
      <label for="languageSelect" class="languageSelect">Choose Language:</label>
      <select id="languageSelect" aria-label="Select Language">
       <option value="ikinyarwanda">Ikinyarwanda</option>  
       <option value="french">French</option>
        <option value="spanish">Spanish</option>
      </select>

      <label class ="difficultySelect" for="difficultySelect">Difficulty:</label>
      <select  id="difficultySelect" aria-label="Select Difficulty">
        <option value="all">All</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>
    <div class="score-display" aria-live="polite">
      Score: <span id="score">0</span>
    </div>
      </div>
    <div id="quiz-container">
      <div id="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Quiz Progress"></div>

      <div id="question-container">
        <h2 id="question" aria-live="polite" aria-atomic="true">Loading question...</h2>
        <div id="difficulty-badge" class="difficulty-badge" aria-label="Question difficulty"></div>

        <!-- Timer container with label and timer span -->
        <div id="timer-container" style="display: none;">
          <span id="timer-label">Time left:</span> <span id="timer">3</span>s
        </div>

        <div id="choices" class="choices-grid" role="list"></div>
      </div>

      <div id="end-quiz-container">
        <button id="end-quiz-btn" type="button" class="btn btn-secondary">End Quiz</button>
      </div>
    </div>

    <div id="result-container" class="hide" aria-live="polite" aria-atomic="true">
      <h2>Quiz Complete!</h2>
      <p>Your final score: <span id="final-score">0</span></p>
      <button id="restart-btn" type="button" class="btn btn-primary">Restart Quiz</button>
    </div>
    </div>
  </main>
 
  <aside id="leaderboard-container" class="board" aria-label="Leaderboard">
    <h3>Leaderboard</h3>
    <ol id="leaderboard-list"></ol>
  </aside>

  <nav class="bottom-nav">
    <a href="../index.html"><i class="fas fa-home"></i>Home</a>
    <a href="../flashcards/flashcards.html"><i class="fas fa-layer-group"></i>Cards</a>
    <a href="quiz.html" class="active"><i class="fas fa-vial"></i>Quiz</a>
    <a href="../survey/survey.html"><i class="fas fa-comment"></i>Feedback</a>
  </nav>
