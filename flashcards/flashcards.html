<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>ejo flashcards</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='75' font-size='75' font-weight='bold' fill='%23FF6B6B'%3Eejo%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="../components.css">
    <link rel="stylesheet" href="flashcards.css">
</head>
<header class="app-header">
  <img src="../images/logo.svg" alt="Ejo Flashcards Logo" class="logo">
  <button class="nav-toggle" aria-label="Toggle navigation">
    <i class="fas fa-bars"></i>
  </button>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../quiz/quiz.html">Quiz</a>
    <a href="../survey/survey.html">Feedback</a>
  </nav>
</header>
<body>

  <main class="app-main">
    <div class="app-card">
      <h1> Flashcards</h1>
      
      <!-- flashcards-->
      <section id="flashcards-section">
  <div id="flashcard-container">
    <div class="flashcard-scene">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-content">
            <div id="front-content"></div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-content">
            <div id="back-content"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="flashcard-controls">
    
    <div class="progress-container">
      <span id="current-card">1</span> out of <span id="total-cards">10</span>
    </div>
    <button id="prev-flashcard" type="button">Previous</button>
    <button id="flip-flashcard" type="button">Flip</button>
    <button id="next-flashcard" type="button">Next</button>
    <button id="skip-flashcard">Skip</button>


    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search flashcards...">
        <div id="search-results" class="search-results"></div>
    </div>
    <input type="number" id="goto-card" min="1" placeholder="Go to card #" >
  </div>
  <button id="start-quiz" class="btn btn-primary">Quiz Mode</button>

</section>

<div id="quiz-container" style="display:none; margin-top:20px;">
  <h3 id="quiz-question"></h3>
  <div id="quiz-options"></div>
  <p id="quiz-feedback"></p>
  <button id="next-question" class="btn btn-secondary" style="display:none;">Next</button>
  <p id="quiz-score"></p>
</div>

<aside id="flashcard-leaderboard" class="board" style="display:none;" aria-label="Leaderboard">
  <h3>Leaderboard</h3>
  <ol id="flashcard-leaderboard-list"></ol>
</aside>
    </div>
  </main>
    
  <footer class="app-footer">
    <div class="social-links">
      <a href="../documentation.html" style="color: white; text-decoration: underline;">Documentation</a>
      <a href="https://x.com/Nbenduse" class="social-icon" target="_blank" rel="noopener" aria-label="Twitter">
        <i class="fab fa-twitter"></i>
      </a>
      <a href="https://www.linkedin.com/in/benjamin-niyodusenga/" class="social-icon" target="_blank" rel="noopener" aria-label="LinkedIn">
        <i class="fab fa-linkedin-in"></i>
      </a>
      <a href="https://github.com/benduse" class="social-icon" target="_blank" rel="noopener" aria-label="GitHub">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://www.instagram.com/bennduse/" class="social-icon" target="_blank" rel="noopener" aria-label="Instagram">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
    <p>&copy; 2025 Benjamin. All Rights Reserved</p>
  </footer>

  <script src="flashcards.js" type="module"></script>
  <script src="../gamificationUI.js" type="module"></script>
  <script>
    document.querySelector('.nav-toggle')?.addEventListener('click', () => {
      document.querySelector('.app-header nav').classList.toggle('active');
    });
  </script>
</body>
</html>
